# Copy to secrets/secrets.toml (gitignored) and fill in real values.
# Never commit the real file.

[openrouter]
api_key = "sk-or-..."
# Model tiering (issue #23): llm_tier selects which of the three model
# keys below get_client() sends requests with. Defaults to "building"
# when unset.
llm_tier = "building"
building_model = "nvidia/nemotron-3-ultra-550b-a55b:free"
production_high = "deepseek/deepseek-v4-pro"
production_low = "deepseek/deepseek-v4-flash"
# Issue #116: when a completion's finish_reason is "content_filter" (a
# moderation refusal), it is rerouted -- once, never blind-retried against
# the same model -- to this model instead. Optional; absent means no
# fallback (a refusal raises ContentRefusedError directly). Choose a model
# that does not moderate scholarly descriptions of violence, since this
# corpus's source material routinely discusses war, atrocity, and conflict
# in an academic register that some providers' default moderation flags.
# content_fallback_model = "some/unmoderated-model"

[nvidia]
api_key = "nvapi-..."

[drive]
# Google Drive source connector (issue #237, specs/PRODUCT.md Sec. 7.10 /
# P0-11): a service account's JSON key path and the shared "Books" folder's
# Drive id. Missing or incomplete values halt `axial drive ingest` with a
# clear logged error before any network call.
service_account_json = "secrets/gdrive-service-account.json"
books_folder_id = "your-drive-folder-id"
