# Template: Python tests with uv + pytest (this repo's default profile).
# Customise: Python version and the test command if the project diverges.
#
# PROJECT IN A SUBDIRECTORY? If the app is NOT at the repo root, set
# `defaults.run.working-directory` to the app dir (affects every `run:` step).
# If the app IS at the repo root, delete the `defaults:` block.
#
# Verify action versions before committing — majors move.
name: CI

on:
  push:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: .            # <-- app dir from repo root (delete this block if repo root)

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run test suite (outer contracts + inner unit tests)
        run: uv run pytest -q

      - name: Lint
        run: uv run ruff check .
