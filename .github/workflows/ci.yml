# CI for this repo (tdd-ci deliverable): runs the full suite - outer acceptance
# contracts in tests/ plus inner unit tests under src/ - and lint, on every push
# and on PRs into main. No secrets are read or committed; if a job ever needs
# credentials, inject them via repo Actions secrets.
name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # docling downloads its layout + TableFormer weights from the Hugging Face
      # Hub on first conversion (docling-project/docling-layout-heron and
      # docling-project/docling-models). Cache them across runs so only the very
      # first run pays the download; OCR is disabled in extract.py, so no
      # modelscope/RapidOCR weights are ever fetched.
      - name: Cache docling model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ hashFiles('uv.lock') }}
          restore-keys: |
            hf-cache-

      - name: Install dependencies
        run: uv sync

      # The one real-docling end-to-end unit test is marked `slow`; it is
      # deselected here because the outer acceptance test (tests/test_extract.py)
      # already exercises the real docling path end-to-end via the CLI. Every
      # other test - all fast unit tests and every outer acceptance contract -
      # runs.
      - name: Run test suite
        run: uv run pytest -q -m "not slow"

      - name: Lint
        run: uv run ruff check .
