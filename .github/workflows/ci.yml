# CI for this repo (tdd-ci deliverable): runs the full suite - outer acceptance
# contracts in tests/ plus inner unit tests under src/ - and lint, on every push
# and on PRs into main. No secrets are read or committed; if a job ever needs
# credentials, inject them via repo Actions secrets.
name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # docling downloads its layout + TableFormer weights from the Hugging Face
      # Hub on first conversion (docling-project/docling-layout-heron and
      # docling-project/docling-models). Cache them across runs so only the very
      # first run pays the download; OCR is disabled in extract.py, so no
      # modelscope/RapidOCR weights are ever fetched. The same cache also
      # covers the stage-5 embedding pass's sentence-transformer checkpoint
      # (sentence-transformers/all-MiniLM-L6-v2, issue #296) -- both live
      # under ~/.cache/huggingface, so no separate cache step is needed.
      - name: Cache docling model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ hashFiles('uv.lock') }}
          restore-keys: |
            hf-cache-

      # `distill` (issue #296, DEC-35: sentence-transformers + lancedb) is an
      # optional dependency group, not part of the default `dependencies`/`dev`
      # groups -- synced explicitly so the stage-5 embedding-pass tests
      # (src/axial/distill/, tests/distill/) run for real instead of skipping.
      - name: Install dependencies
        run: uv sync --group distill

      # The one real-docling end-to-end unit test is marked `slow`; it is
      # deselected because the outer acceptance test (tests/test_extract.py)
      # already exercises the real docling path end-to-end via the CLI.
      #
      # The suite is run in two passes. The hermetic src/ unit tests parallelize
      # cleanly across cores (pytest-xdist). The tests/ acceptance contracts drive
      # the CLI through subprocesses that share the real data/envelopes and
      # data/vault scratch dirs, so they must run serially -- parallel workers
      # would clobber each other's envelope/vault state. Both passes must pass.
      - name: Run unit tests (parallel)
        run: uv run pytest src -q -m "not slow" -n auto

      - name: Run acceptance tests (serial)
        run: uv run pytest tests -q -m "not slow"

      - name: Lint
        run: uv run ruff check .
