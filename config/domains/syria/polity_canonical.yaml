# Syria domain: offline canonical polity normalization map (issue #205).
#
# A versioned, human-editable, LIVING map -- append new nodes/aliases as
# the corpus grows. Never a closed gate: an unmapped polity verbatim
# always passes through the tagging pipeline unchanged and is only ever
# logged as a candidate by `axial polity report` (see
# src/axial/polity_canonical.py, specs/PRODUCT.md Appendix C, Sec 11
# step 7).
#
# Shape: a list of `nodes`, each with:
#   canonical  -- the referent's canonical name
#   kind       -- modern | historical | supra-national
#   aliases    -- verbatims that fold to this node (exact, normalized
#                 match only -- casefold + collapse/trim whitespace,
#                 never fuzzy)
#   children   -- optional nested sub-polities (a real parent-child
#                 relation, e.g. Scotland/England/Northern Ireland under
#                 the United Kingdom) -- a child's own alias resolves to
#                 the CHILD, never blanket-merged into its parent.
#
# Seeded 2026-07-17 from `axial polity build` over the real vault
# (data/vault/prose, ~16,949 notes at seed time), folding the obvious
# clusters (UK cluster, Soviet Union/USSR, East Timor/Timor-Leste,
# spelling variants) and tagging clearly defunct/ancient polities
# historical.
#
# Deliberately conservative: bracket-qualified contextual variants
# ("Syria (Ottoman Empire)", "Bosnia and Herzegovina (BiH)", etc.) and
# ad-hoc multi-country mentions are left OUT of this tree on purpose so
# `axial polity report`'s leak/candidate detection surfaces them for a
# human to fold or flag by hand, rather than this seed silently
# guessing.
