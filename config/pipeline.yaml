# Pipeline configuration: providers, model-per-pass, paths, batch sizes
# (PRD §6). Model-per-pass tuning was originally deferred (see
# plans/minimal-ingestion/04-structural-envelope.md, "out of scope"), with
# v0 giving every LLM-backed pass the same provider/model; DEC-26/issue #235
# landed the first per-pass override (`llm.model_by_pass` below), mirroring
# `reasoning_by_pass`'s own already-live per-pass mechanism. Every pass not
# named in `model_by_pass` still shares the one default provider/model
# configured here.
#
# The provider here is the default; it is overridden without editing this
# file by the AXIAL_LLM_PROVIDER environment variable (see src/axial/llm.py),
# which is how tests and CI select the no-network `stub`/`explode` seams.
#
# The OpenRouter API key and model name are NOT configured here (issue #23):
# they come from `[openrouter]` in secrets/secrets.toml (api_key, plus
# building_model/production_high/production_low selected by llm_tier), with
# the OPENROUTER_API_KEY environment variable as a fallback for the key only
# when secrets.toml is absent or lacks it. See secrets/secrets.example.toml.
llm:
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  # Per-pass model reasoning (issue #207, PRD §7.9): a per-pass setting,
  # never hardcoded (src/axial/llm.py's OpenRouterClient reads this map via
  # _resolve_reasoning_by_pass, falling back to axial.llm.
  # DEFAULT_REASONING_BY_PASS when this block or the file is absent). ON for
  # the structural-envelope pass and the content-apparatus classification
  # gate (small, judgment-heavy, once/rarely-per-source calls); OFF
  # (unchanged since #147, which found reasoning blew the wall-clock on
  # large chunk-echo tag calls) for the high-volume tag/artifacts/xref
  # calls.
  reasoning_by_pass:
    envelope: true
    content_apparatus: true
    # Holdings-completeness check (§7.11, issue #284): one call per source,
    # same profile as the envelope. The acceptance bar is 0 false positives
    # over 30 sources, so precision is the whole point.
    holdings: true
    tag: false
    artifacts: false
    xref: false
  # Per-pass model tiering (DEC-26, issue #235): a per-pass MODEL override,
  # mirroring reasoning_by_pass's own per-pass shape (src/axial/llm.py's
  # OpenRouterClient reads this map via _resolve_model_by_pass, resolving
  # each named tier to a concrete model through the same secrets.toml
  # tier->model machinery llm_tier above uses). Absent from this map means
  # the pass keeps sending requests to the client's own default configured
  # model (llm_tier above) -- unchanged for every pass not named here. The
  # envelope pass's toc reconstruction is a once-per-source, judgment-heavy
  # call whose cost does not scale with corpus size, so it runs on the
  # stronger production_high tier (deepseek-v4-pro) -- the project's first
  # per-pass model override.
  model_by_pass:
    envelope: production_high
  # Per-pass best-of-N voting (DEC-31, issue #294): how many times a pass
  # draws its per-unit call before majority-voting the blind axes, mirroring
  # the two per-pass blocks above (src/axial/llm.py's _resolve_votes_by_pass
  # merges this over axial.llm.DEFAULT_VOTES_BY_PASS). Absent from this map
  # means one draw and no voting layer -- today's behavior for every pass
  # but tag. N=3 is DEC-31's measured agreement-per-cost point (theory_school
  # 0.757 -> 0.918, claim_type 0.796 -> 0.866); N=5 buys near-zero abstention
  # for 5x the calls and is a config change here, not a code change.
  votes_by_pass:
    tag: 3

paths:
  envelopes_dir: data/envelopes
  vault_dir: data/vault

# Stage-3 agentic retrieval loop (issue #253, PRD §7.5/§7.6, P0-3): a
# bounded step budget is a stated tunable, never hardcoded at the call
# site (src/axial/retrieve/loop.py reads this via _resolve_step_budget,
# falling back to its own DEFAULT_STEP_BUDGET when this file or key is
# absent). 10 is a starting value for the walking skeleton, not yet
# measured against the dev briefs (that measurement is a later, separate
# pass, like the tier choice in §7.11).
retrieve:
  step_budget: 10

# Google Drive connector tunables (issue #239, PRD §7.10 "Language-gate
# tunables" paragraph / §8 P0-11c): the English-only language gate's
# bounded text probe size and its accept-confidence threshold. src/axial/
# drive.py reads this block via _language_gate_config; an absent block/key
# falls back to that module's own DEFAULT_LANGUAGE_PROBE_CHARS /
# DEFAULT_LANGUAGE_ACCEPT_THRESHOLD.
drive:
  # Leading characters of a downloaded source's text layer fed to
  # langdetect -- large enough (a few hundred words) to classify reliably,
  # small enough to stay cheap per source.
  language_probe_chars: 4000
  # Minimum langdetect confidence (0-1) for the top-detected language to be
  # accepted as English. Set high on purpose: a false negative (a real
  # English source rejected) costs a manual re-check; a false positive
  # (non-English let through) pollutes the corpus and the eval.
  language_accept_threshold: 0.9
