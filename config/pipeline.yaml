# Pipeline configuration: providers, model-per-pass, paths, batch sizes
# (PRD §6). Model-per-pass tuning is deferred (see plans/minimal-ingestion/
# 04-structural-envelope.md, "out of scope"); v0 gives every LLM-backed pass
# the same provider/model.
#
# The provider here is the default; it is overridden without editing this
# file by the AXIAL_LLM_PROVIDER environment variable (see src/axial/llm.py),
# which is how tests and CI select the no-network `stub`/`explode` seams.
#
# The OpenRouter API key and model name are NOT configured here (issue #23):
# they come from `[openrouter]` in secrets/secrets.toml (api_key, plus
# building_model/production_high/production_low selected by llm_tier), with
# the OPENROUTER_API_KEY environment variable as a fallback for the key only
# when secrets.toml is absent or lacks it. See secrets/secrets.example.toml.
llm:
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  # Per-pass model reasoning (issue #207, PRD §7.9): a per-pass setting,
  # never hardcoded (src/axial/llm.py's OpenRouterClient reads this map via
  # _resolve_reasoning_by_pass, falling back to axial.llm.
  # DEFAULT_REASONING_BY_PASS when this block or the file is absent). ON for
  # the structural-envelope pass and the content-apparatus classification
  # gate (small, judgment-heavy, once/rarely-per-source calls); OFF
  # (unchanged since #147, which found reasoning blew the wall-clock on
  # large chunk-echo tag calls) for the high-volume tag/artifacts/xref
  # calls.
  reasoning_by_pass:
    envelope: true
    content_apparatus: true
    tag: false
    artifacts: false
    xref: false

paths:
  envelopes_dir: data/envelopes
  vault_dir: data/vault
