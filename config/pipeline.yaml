# Pipeline configuration: providers, model-per-pass, paths, batch sizes
# (PRD §6). Model-per-pass tuning was originally deferred (see
# plans/minimal-ingestion/04-structural-envelope.md, "out of scope"), with
# v0 giving every LLM-backed pass the same provider/model; DEC-26/issue #235
# landed the first per-pass override (`llm.model_by_pass` below), mirroring
# `reasoning_by_pass`'s own already-live per-pass mechanism. Every pass not
# named in `model_by_pass` still shares the one default provider/model
# configured here.
#
# The provider here is the default; it is overridden without editing this
# file by the AXIAL_LLM_PROVIDER environment variable (see src/axial/llm.py),
# which is how tests and CI select the no-network `stub`/`explode` seams.
#
# The OpenRouter API key and model name are NOT configured here (issue #23):
# they come from `[openrouter]` in secrets/secrets.toml (api_key, plus
# building_model/production_high/production_low selected by llm_tier), with
# the OPENROUTER_API_KEY environment variable as a fallback for the key only
# when secrets.toml is absent or lacks it. See secrets/secrets.example.toml.
llm:
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  # Per-pass model reasoning (issue #207, PRD §7.9): a per-pass setting,
  # never hardcoded (src/axial/llm.py's OpenRouterClient reads this map via
  # _resolve_reasoning_by_pass, falling back to axial.llm.
  # DEFAULT_REASONING_BY_PASS when this block or the file is absent). ON for
  # the structural-envelope pass and the content-apparatus classification
  # gate (small, judgment-heavy, once/rarely-per-source calls); OFF
  # (unchanged since #147, which found reasoning blew the wall-clock on
  # large chunk-echo tag calls) for the high-volume tag/artifacts/xref
  # calls.
  reasoning_by_pass:
    envelope: true
    content_apparatus: true
    # Holdings-completeness check (§7.11, issue #284): one call per source,
    # same profile as the envelope. The acceptance bar is 0 false positives
    # over 30 sources, so precision is the whole point.
    holdings: true
    # Phase-B stage-4 synthesis (§7.11, issue #256): the judgment-heavy,
    # once-per-brief call every downstream validator checks. [TENTATIVE]
    # per §7.11 -- tuned on the first real briefs, not asserted here as final.
    # Founder-requested model-swap experiment (2026-07): an explicit "high"
    # effort level, not a bare `true` -- glm-5.2/deepseek-v4-pro/-flash only
    # support "high"/"xhigh" (no "medium"), so leaving it as a bool would
    # hand OpenRouter's implicit "medium" default to its own remap-to-nearest
    # instead of a deliberate choice (see src/axial/llm.py's
    # `_post_with_deadline`). "high" over "xhigh" ("max reasoning" per the
    # model cards) as the starting, unmeasured pick balancing quality against
    # latency/cost -- not yet tuned against real briefs, like every other
    # §7.11 tier/effort choice.
    synthesize: high
    # Brief-interrogation pre-pass (§7.2, issue #252): same experiment,
    # paired with routing this pass onto production_high below -- the
    # "does this premise's coverage-table row plausibly match" judgment call
    # that a 2026-07-23 sim-brief run showed the flash tier (reasoning off)
    # getting wrong (real "Syria" coverage misread as absent for a
    # "Syria, <date range>" case string).
    interrogate: high
    # Stage-3 agentic retrieval loop (§7.5/§7.6, issue #253): same
    # experiment; model stays production_low (deepseek-v4-flash, unchanged)
    # per the founder's request, reasoning turned on for the tool-selection
    # judgment calls within the loop.
    retrieve: high
    tag: false
    artifacts: false
    xref: false
  # NOTE on the three 2026-07 model-swap entries above and model_by_pass's
  # synthesize/interrogate below: this is a founder-directed provisional
  # pick to unblock real sim-brief runs, not a decided answer. The founder
  # has stated a formal per-pass model/reasoning eval -- covering more
  # combinations including frontier models, scored on output quality, cost,
  # latency, and whatever else matters per pass -- is planned once the app
  # is stable. Nothing here should be read as final until that eval lands.
  # Per-pass model tiering (DEC-26, issue #235): a per-pass MODEL override,
  # mirroring reasoning_by_pass's own per-pass shape (src/axial/llm.py's
  # OpenRouterClient reads this map via _resolve_model_by_pass, resolving
  # each named tier to a concrete model through the same secrets.toml
  # tier->model machinery llm_tier above uses). Absent from this map means
  # the pass keeps sending requests to the client's own default configured
  # model (llm_tier above) -- unchanged for every pass not named here. The
  # envelope pass's toc reconstruction is a once-per-source, judgment-heavy
  # call whose cost does not scale with corpus size, so it runs on the
  # stronger production_high tier (deepseek-v4-pro) -- the project's first
  # per-pass model override.
  model_by_pass:
    envelope: production_high
    # Phase-B stage-4 synthesis (§7.11, issue #256): a dedicated tier,
    # mirroring envelope's own once-per-run, judgment-heavy profile but
    # NAMED SEPARATELY from production_high (2026-07 model-swap experiment)
    # so synthesis can move to a different model than envelope without
    # moving envelope too. Which concrete model backs production_synthesis
    # is out of this slice's scope, never hardcoded here -- see
    # secrets/secrets.toml.
    synthesize: production_synthesis
    # Brief-interrogation pre-pass (§7.2, issue #252): 2026-07 model-swap
    # experiment, moved off the default (production_low/flash) tier onto
    # production_high -- see the paired reasoning_by_pass.interrogate note
    # above for why.
    interrogate: production_high
  # Per-pass best-of-N voting (DEC-31, issue #294): how many times a pass
  # draws its per-unit call before majority-voting the blind axes, mirroring
  # the two per-pass blocks above (src/axial/llm.py's _resolve_votes_by_pass
  # merges this over axial.llm.DEFAULT_VOTES_BY_PASS). Absent from this map
  # means one draw and no voting layer -- today's behavior for every pass
  # but tag. N=3 is DEC-31's measured agreement-per-cost point (theory_school
  # 0.757 -> 0.918, claim_type 0.796 -> 0.866); N=5 buys near-zero abstention
  # for 5x the calls and is a config change here, not a code change.
  votes_by_pass:
    tag: 3

paths:
  envelopes_dir: data/envelopes
  vault_dir: data/vault

# Stage-3 agentic retrieval loop (issue #253, PRD §7.5/§7.6, P0-3): a
# bounded step budget is a stated tunable, never hardcoded at the call
# site (src/axial/retrieve/loop.py reads this via _resolve_step_budget,
# falling back to its own DEFAULT_STEP_BUDGET when this file or key is
# absent). 10 is a starting value for the walking skeleton, not yet
# measured against the dev briefs (that measurement is a later, separate
# pass, like the tier choice in §7.11).
retrieve:
  step_budget: 10
  # Slice 02 (issue #254, PRD §4/§7.6): the re-query-on-thin threshold. A
  # tool result whose result_count is below this floor is fed back to the
  # model flagged as thin, so the agent can decide to broaden its query
  # (src/axial/retrieve/loop.py reads this via _resolve_thin_result_floor,
  # falling back to its own DEFAULT_THIN_RESULT_FLOOR when this file or key
  # is absent). 3 is a stated starting value, not yet measured against the
  # dev briefs -- tuning it is explicitly out of this slice's scope.
  thin_result_floor: 3

# Stage-4 synthesis prompt's evidence-text budget (issue #358): a real brief
# run against the real vault assembled enough chunk text that the synthesis
# prompt, combined with the fixed 60k-token completion budget sent on every
# call, pushed past the model's context window and OpenRouter rejected the
# request outright -- `retrieve.step_budget` above bounds the number of tool
# calls a retrieval run makes, not the number of chunks a single call can
# return. src/axial/analyze/synthesis.py reads this via
# _resolve_evidence_char_budget, falling back to its own
# DEFAULT_EVIDENCE_CHAR_BUDGET when this file or the key is absent.
# Character-based, not a real token count (~4 chars/token is a standard
# rough English-prose estimate): 100_000 chars is roughly 25k tokens of
# evidence text, conservative headroom under a 128k-class context window
# even after the 60k-token completion reservation. [TENTATIVE], mirroring
# step_budget/thin_result_floor's own starting-value status -- not yet
# measured against a real brief run.
synthesis:
  evidence_char_budget: 100000

# Stage-5 counter-position validator's contested-detection rule (issue #259,
# PRD §7.8/§7.9): a brief is contested when its evidence spans at least this
# many distinct *substantive* `theory_school` primaries (the `not-applicable`/
# `unlisted` sentinels excluded), OR when any evidence chunk carries
# `role_in_argument: role:counter-position` (not a numeric knob -- either it
# fired or it didn't). src/axial/validators/counter_position.py reads this via
# _resolve_min_distinct_theory_schools, falling back to its own
# DEFAULT_MIN_DISTINCT_THEORY_SCHOOLS when this file or key is absent. 2 is
# the spec's own stated starting hypothesis (§7.8), proven on the dev briefs
# separately -- tuning it is explicitly out of this slice's scope.
contested_detection:
  min_distinct_theory_schools: 2

# Google Drive connector tunables (issue #239, PRD §7.10 "Language-gate
# tunables" paragraph / §8 P0-11c): the English-only language gate's
# bounded text probe size and its accept-confidence threshold. src/axial/
# drive.py reads this block via _language_gate_config; an absent block/key
# falls back to that module's own DEFAULT_LANGUAGE_PROBE_CHARS /
# DEFAULT_LANGUAGE_ACCEPT_THRESHOLD.
drive:
  # Leading characters of a downloaded source's text layer fed to
  # langdetect -- large enough (a few hundred words) to classify reliably,
  # small enough to stay cheap per source.
  language_probe_chars: 4000
  # Minimum langdetect confidence (0-1) for the top-detected language to be
  # accepted as English. Set high on purpose: a false negative (a real
  # English source rejected) costs a manual re-check; a false positive
  # (non-English let through) pollutes the corpus and the eval.
  language_accept_threshold: 0.9

# Per-polity coverage-band cut points (issue #260, PRD §7.7): a stated,
# tunable hypothesis over the ~17k-chunk vault, in the spirit of the
# Phase-A chunk band (PRODUCT.md §7.7) -- src/axial/validators/coverage.py
# reads this via _resolve_coverage_bands, falling back to its own
# DEFAULT_MODERATE_FLOOR/DEFAULT_DENSE_FLOOR when this file or either key
# is absent. `thin` is corpus_chunk_count below moderate_floor, `moderate`
# is [moderate_floor, dense_floor), `dense` is dense_floor and above.
# Proven by inspection (`axial brief coverage <brief_id>`) against the real
# corpus before it gates anything -- tuning it is out of this slice's scope.
coverage_bands:
  moderate_floor: 20
  dense_floor: 100

# Rung-3 eval-gate thresholds (issues #262, #264, PRD §10, §8 P0-12): one
# starting threshold per named metric, read by src/axial/gates/harness.py via
# resolve_threshold, falling back to that module's own
# DEFAULT_GATE_THRESHOLDS when this file or a key is absent. The FIRM
# principle behind each gate (attribution fidelity, grounding, adversarial
# red-teaming) is fixed; these numbers are §10's stated TUNABLE starting
# hypotheses, never proven values -- tuning them on real runs is explicitly
# out of scope for the issue that landed each gate.
gates:
  # Attribution fidelity (charter Principle II): the hard, 100% mechanical
  # gate -- one unmarked or unresolvable-grounds claim fails it outright.
  attribution_completeness: 1.00
  # Attribution fidelity's judged half: the share of kind-"b" claims an
  # independent model finds phrased as a source assertion rather than the
  # tool's own cross-source inference.
  b_seam_mislabel_rate: 0.05
  # Grounding (charter Principle I): the share of kind-"a" claims whose cited
  # grounds substantively support the claim, judged by an independent model
  # anchored to the resolved chunk text.
  grounding_support_rate: 0.90
  # Synthesis quality (issue #263, charter Principle IV): the share of the
  # contested-brief subset that is present-or-disclosed (§7.8).
  counter_position_presence_rate: 0.95
  # Synthesis quality's judged half: the share of present counter-positions
  # that verdict "steelman" (not "strawman") against the cited grounds --
  # this slice's operationalization of "the eval #1 rubric bar" (§10),
  # since the rubric itself is not authored yet. No spec-stated number; 0.90
  # is a starting hypothesis, tuned once the rubric lands.
  steelman_quality: 0.90
  # Calibration (issue #263, charter Principle V, §7.4): how far an
  # observed band's judged-correctness rate may sit from that band's stated
  # target rate (src/axial/gates/calibration.py) -- band-wise, not ECE/Brier
  # (§10 v1.1, founder-adjudicated).
  band_reliability: 0.15
  # Adversarial-brief red-teaming (charter Principle III, issue #264): the
  # share of a seeded set of adversarial briefs on which the interrogation
  # pre-pass named the smuggled premise.
  premise_catch_rate: 0.80

# Calibration gate band targets (issue #263, PRD §7.4 [TENTATIVE]): the
# stated expected-correctness rate per confidence band, read by
# src/axial/gates/calibration.py via _resolve_band_targets, falling back to
# that module's own DEFAULT_BAND_TARGETS when this file or a key is absent.
# `medium` is the midpoint of §7.4's stated 0.60-0.85 range. Tuning these on
# the first judged runs is explicitly out of this issue's scope.
calibration:
  band_targets:
    high: 0.85
    medium: 0.725
    low: 0.60
