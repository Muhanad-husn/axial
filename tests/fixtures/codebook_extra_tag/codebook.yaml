# Carries an extra `delta` tag that schema.yaml (same directory) does not
# declare on the `topic` axis. See tests/test_schema_validate.py.

axes:
  topic:
    alpha:
      definition: "Definition of alpha."
      positive_example: "A passage that is an example of alpha."
      negative_example: "A passage that is not an example of alpha."
    beta:
      definition: "Definition of beta."
      positive_example: "A passage that is an example of beta."
      negative_example: "A passage that is not an example of beta."
    delta:
      definition: "Definition of delta -- not declared by the schema."
      positive_example: "A passage that is an example of delta."
      negative_example: "A passage that is not an example of delta."
